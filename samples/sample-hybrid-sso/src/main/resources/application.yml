server:
  port: 8083

auth:
  jwt:
    secret: ${JWT_SECRET:01234567890123456789012345678901}
  oauth2:
    enabled: true

spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - openid
              - profile
              - email
        provider:
          google:
            issuer-uri: https://accounts.google.com
